<!doctype html>
<html lang= en>
  <head>
    <meta charset=utf-8 />
    <meta name=viewport content=width=device-width initial-scale=1 />
    <title>Video ? Text ? Speech</title>
    <link rel=stylesheet href=style.css />
  </head>
  <body>
    <main class=app-shell>
      <h1>Video ? Text ? Speech</h1>
      <section class=panel>
        <label class=field>
          <span>Upload a silent video</span>
          <input id=videoInput type=file accept=video/* />
        </label>
        <div class=controls>
          <button id=startStream type=button>Process video</button>
          <button id=stopStream type=button>Stop</button>
          <button id=resetStream type=button>Reset session</button>
        </div>
      </section>

      <section class=panel>
        <h2>Video preview</h2>
        <video id=videoPreview controls playsinline></video>
      </section>

      <section class=panel>
        <h2>Live transcript</h2>
        <div id=transcriptOutput class=transcript-box></div>
      </section>

      <section class=panel>
        <h2>Status log</h2>
        <div id=statusMessages class=status-log></div>
      </section>
    </main>

    <div id=loadingOverlay class=loading-overlay hidden>
      <div class=loading-overlay__content>
        <p class=loading-overlay__message>Processing silent video…</p>
        <p class=loading-overlay__hint>Please wait while we capture frames, narrate, and stitch playback.</p>
      </div>
    </div>

    <script src=app.js></script>
  </body>
</html>
